<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGosling Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            margin-bottom: 40px;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
        }

        h2 {
            font-size: 1.5rem;
            margin: 30px 0 20px;
            color: #333;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #764ba2;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            margin-bottom: 15px;
            color: #666;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>AIGosling Admin</h1>
            <a href="index.html" class="nav-link">返回网站</a>
        </div>
    </header>

    <div class="container">
        <!-- 作品管理 -->
        <h2>作品管理</h2>
        <div class="form-container">
            <h3>添加新作品</h3>
            <form id="work-form">
                <div class="form-group">
                    <label for="work-title">标题</label>
                    <input type="text" id="work-title" required>
                </div>
                <div class="form-group">
                    <label for="work-description">描述</label>
                    <textarea id="work-description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="work-cover">封面图片 URL</label>
                    <input type="text" id="work-cover">
                </div>
                <div class="form-group">
                    <label for="work-tags">标签 (用逗号分隔)</label>
                    <input type="text" id="work-tags">
                </div>
                <button type="submit">添加作品</button>
            </form>
        </div>

        <div id="works-list" class="card-grid">
            <!-- 作品列表将通过 JavaScript 动态加载 -->
        </div>

        <!-- 教程管理 -->
        <h2>教程管理</h2>
        <div class="form-container">
            <h3>添加新教程</h3>
            <form id="tutorial-form">
                <div class="form-group">
                    <label for="tutorial-title">标题</label>
                    <input type="text" id="tutorial-title" required>
                </div>
                <div class="form-group">
                    <label for="tutorial-description">描述</label>
                    <textarea id="tutorial-description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="tutorial-cover">封面图片 URL</label>
                    <input type="text" id="tutorial-cover">
                </div>
                <div class="form-group">
                    <label for="tutorial-tags">标签 (用逗号分隔)</label>
                    <input type="text" id="tutorial-tags">
                </div>
                <button type="submit">添加教程</button>
            </form>
        </div>

        <div id="tutorials-list" class="card-grid">
            <!-- 教程列表将通过 JavaScript 动态加载 -->
        </div>
    </div>

    <script>
        // 从本地存储加载数据
        function loadData() {
            const works = JSON.parse(localStorage.getItem('aigosling_works') || '[]');
            const tutorials = JSON.parse(localStorage.getItem('aigosling_tutorials') || '[]');

            renderWorks(works);
            renderTutorials(tutorials);
        }

        // 保存数据到本地存储
        function saveData() {
            localStorage.setItem('aigosling_works', JSON.stringify(works));
            localStorage.setItem('aigosling_tutorials', JSON.stringify(tutorials));
        }

        // 全局数据数组
        let works = JSON.parse(localStorage.getItem('aigosling_works') || '[]');
        let tutorials = JSON.parse(localStorage.getItem('aigosling_tutorials') || '[]');

        // 渲染作品列表
        function renderWorks(works) {
            const list = document.getElementById('works-list');
            list.innerHTML = '';

            works.forEach((work, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${work.title}</h3>
                    <p>${work.description}</p>
                    <div class="card-actions">
                        <button class="btn-secondary" onclick="editWork(${index})">编辑</button>
                        <button class="btn-danger" onclick="deleteWork(${index})">删除</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 渲染教程列表
        function renderTutorials(tutorials) {
            const list = document.getElementById('tutorials-list');
            list.innerHTML = '';

            tutorials.forEach((tutorial, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${tutorial.title}</h3>
                    <p>${tutorial.description}</p>
                    <div class="card-actions">
                        <button class="btn-secondary" onclick="editTutorial(${index})">编辑</button>
                        <button class="btn-danger" onclick="deleteTutorial(${index})">删除</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 添加作品
        document.getElementById('work-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('work-title').value;
            const description = document.getElementById('work-description').value;
            const cover = document.getElementById('work-cover').value;
            const tags = document.getElementById('work-tags').value.split(',').map(tag => tag.trim()).filter(tag => tag);

            const work = {
                title,
                description,
                cover,
                tags
            };

            works.push(work);
            saveData();
            renderWorks(works);

            // 清空表单
            this.reset();
        });

        // 添加教程
        document.getElementById('tutorial-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('tutorial-title').value;
            const description = document.getElementById('tutorial-description').value;
            const cover = document.getElementById('tutorial-cover').value;
            const tags = document.getElementById('tutorial-tags').value.split(',').map(tag => tag.trim()).filter(tag => tag);

            const tutorial = {
                title,
                description,
                cover,
                tags
            };

            tutorials.push(tutorial);
            saveData();
            renderTutorials(tutorials);

            // 清空表单
            this.reset();
        });

        // 删除作品
        window.deleteWork = function(index) {
            if (confirm('确定要删除这个作品吗？')) {
                works.splice(index, 1);
                saveData();
                renderWorks(works);
            }
        };

        // 删除教程
        window.deleteTutorial = function(index) {
            if (confirm('确定要删除这个教程吗？')) {
                tutorials.splice(index, 1);
                saveData();
                renderTutorials(tutorials);
            }
        };

        // 编辑作品
        window.editWork = function(index) {
            const work = works[index];
            document.getElementById('work-title').value = work.title;
            document.getElementById('work-description').value = work.description;
            document.getElementById('work-cover').value = work.cover;
            document.getElementById('work-tags').value = work.tags.join(', ');

            // 删除原作品，准备添加编辑后的作品
            works.splice(index, 1);
            saveData();
            renderWorks(works);
        };

        // 编辑教程
        window.editTutorial = function(index) {
            const tutorial = tutorials[index];
            document.getElementById('tutorial-title').value = tutorial.title;
            document.getElementById('tutorial-description').value = tutorial.description;
            document.getElementById('tutorial-cover').value = tutorial.cover;
            document.getElementById('tutorial-tags').value = tutorial.tags.join(', ');

            // 删除原教程，准备添加编辑后的教程
            tutorials.splice(index, 1);
            saveData();
            renderTutorials(tutorials);
        };

        // 页面加载时加载数据
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AIGosling</title>
  <script src="https://cdn.jsdelivr.net/npm/notion-client@latest/build/index.min.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
      padding: 40px;
    }
    h1 {
      font-size: 48px;
    }
    .card {
      border: 1px solid #333;
      padding: 20px;
      margin-top: 20px;
    }
    iframe {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>AIGosling</h1>
<p>I create cinematic stories with AI.</p>

<h2>Works</h2>
<div id="works"></div>

<h2>Tutorials</h2>
<div id="tutorials"></div>

<script>
const DATABASE_ID = "76ee4301fc614ed996c203820d960f1d";

async function loadData() {
  const res = await fetch(`https://notion-api.splitbee.io/v1/table/${DATABASE_ID}`);
  const data = await res.json();

  const works = document.getElementById("works");
  const tutorials = document.getElementById("tutorials");

  data.forEach(item => {
    const title = item.Title || "No Title";
    const video = item.Video;
    const desc = item.Description || "";
    const type = item.Type;

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h3>${title}</h3>
      <p>${desc}</p>
      ${video ? `<iframe width="100%" height="200" src="${video.replace("watch?v=", "embed/")}" frameborder="0"></iframe>` : ""}
    `;

    if (type === "Works") {
      works.appendChild(el);
    } else {
      tutorials.appendChild(el);
    }
  });
}

loadData();
</script>

</body>
</html>

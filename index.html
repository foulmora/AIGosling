<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGosling — AI Visual Art</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; color:#f0f0f0;
    font-family:'Inter',sans-serif; overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .progress-bar {
    position:fixed; top:0; left:0; height:2px;
    background:linear-gradient(90deg,#c8a45c,#a78bda,#c8a45c);
    background-size:200% 100%;
    animation:shimmer 3s ease infinite;
    z-index:9999; transition:width .15s linear;
  }
  @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .nav {
    position:fixed; top:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 48px;
    transition:background .5s, backdrop-filter .5s, padding .3s;
  }
  .nav.scrolled {
    background:rgba(10,10,10,.92); backdrop-filter:blur(24px);
    padding-top:16px; padding-bottom:16px;
    border-bottom:1px solid rgba(255,255,255,.04);
  }
  .nav-logo {
    font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:20px; color:#fff; text-decoration:none;
    letter-spacing:-.03em;
  }
  .nav-right { display:flex; align-items:center; gap:32px; }
  .nav-link {
    color:rgba(255,255,255,.45); text-decoration:none;
    font-size:13px; letter-spacing:.08em; transition:color .3s;
  }
  .nav-link:hover { color:#fff; }
  .nav-lang {
    background:none; border:1px solid rgba(255,255,255,.08);
    color:rgba(255,255,255,.25); font-size:12px;
    padding:5px 14px; border-radius:20px; cursor:pointer;
    transition:border-color .3s, color .3s;
  }
  .nav-lang:hover { border-color:rgba(200,164,92,.3); color:rgba(200,164,92,.6); }
  .nav-social { display:flex; align-items:center; gap:18px; }
  .nav-social a {
    color:rgba(255,255,255,.3); transition:color .3s;
    display:flex; align-items:center;
  }
  .nav-social a:hover { color:#c8a45c; }

  /* ===== ADMIN ===== */
  .admin-trigger {
    position:fixed; bottom:8px; right:8px; z-index:99999;
    width:18px; height:18px; opacity:0; cursor:pointer;
  }
  .admin-trigger:hover { opacity:.3; }

  .admin-modal-overlay {
    position:fixed; inset:0; z-index:100000;
    background:rgba(0,0,0,.85); backdrop-filter:blur(12px);
    display:none; align-items:center; justify-content:center;
  }
  .admin-modal-overlay.active { display:flex; }
  .admin-modal {
    background:#111; border:1px solid rgba(255,255,255,.08);
    border-radius:12px; padding:48px 40px; width:400px; max-width:90vw;
    text-align:center;
  }
  .admin-modal h2 {
    font-family:'Space Grotesk',sans-serif; font-size:22px;
    color:#fff; margin-bottom:8px;
  }
  .admin-modal p { color:rgba(255,255,255,.4); font-size:13px; margin-bottom:28px; }
  .admin-modal input[type="password"] {
    width:100%; padding:14px 18px; border-radius:8px;
    border:1px solid rgba(255,255,255,.1); background:#0a0a0a;
    color:#fff; font-size:15px; outline:none;
    transition:border-color .3s;
  }
  .admin-modal input[type="password"]:focus { border-color:rgba(200,164,92,.5); }
  .admin-modal .admin-error { color:#e74c3c; font-size:12px; margin-top:8px; display:none; }
  .admin-modal .admin-error.show { display:block; }
  .admin-btn {
    margin-top:20px; width:100%; padding:14px;
    border-radius:8px; border:none;
    background:linear-gradient(135deg,#c8a45c,#a78bda);
    color:#fff; font-size:15px; font-weight:600; cursor:pointer;
    transition:opacity .3s;
  }
  .admin-btn:hover { opacity:.85; }

  .admin-panel-overlay {
    position:fixed; inset:0; z-index:100000;
    background:rgba(0,0,0,.9); backdrop-filter:blur(16px);
    display:none; overflow-y:auto;
  }
  .admin-panel-overlay.active { display:block; }
  .admin-panel {
    max-width:800px; margin:0 auto; padding:40px 32px 120px;
  }
  .admin-panel-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:40px;
  }
  .admin-panel-header h1 {
    font-family:'Space Grotesk',sans-serif; font-size:26px; color:#fff;
  }
  .admin-close-btn {
    background:none; border:1px solid rgba(255,255,255,.1);
    color:rgba(255,255,255,.5); width:40px; height:40px;
    border-radius:8px; cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .3s, color .3s;
  }
  .admin-close-btn:hover { border-color:rgba(255,255,255,.3); color:#fff; }

  .admin-section {
    background:#111; border:1px solid rgba(255,255,255,.06);
    border-radius:12px; padding:28px; margin-bottom:24px;
  }
  .admin-section h2 {
    font-family:'Space Grotesk',sans-serif; font-size:16px;
    color:#c8a45c; margin-bottom:20px; letter-spacing:.05em;
  }
  .admin-field { margin-bottom:16px; }
  .admin-field label {
    display:block; font-size:12px; color:rgba(255,255,255,.4);
    margin-bottom:6px; letter-spacing:.05em;
  }
  .admin-field input, .admin-field textarea, .admin-field select {
    width:100%; padding:12px 14px; border-radius:8px;
    border:1px solid rgba(255,255,255,.1); background:#0a0a0a;
    color:#fff; font-size:14px; outline:none; font-family:inherit;
    transition:border-color .3s;
  }
  .admin-field input:focus, .admin-field textarea:focus {
    border-color:rgba(200,164,92,.4);
  }
  .admin-field textarea { min-height:80px; resize:vertical; }
  .admin-row { display:flex; gap:12px; }
  .admin-row .admin-field { flex:1; margin-bottom:0; }

  .admin-save-btn {
    padding:12px 32px; border-radius:8px; border:none;
    background:linear-gradient(135deg,#c8a45c,#a78bda);
    color:#fff; font-size:14px; font-weight:600; cursor:pointer;
    transition:opacity .3s;
  }
  .admin-save-btn:hover { opacity:.85; }
  .admin-save-all {
    position:fixed; bottom:32px; right:32px; z-index:100001;
    padding:16px 36px; border-radius:60px; border:none;
    background:linear-gradient(135deg,#c8a45c,#a78bda);
    color:#fff; font-size:15px; font-weight:700; cursor:pointer;
    box-shadow:0 8px 40px rgba(200,164,92,.25);
    transition:transform .3s, box-shadow .3s;
  }
  .admin-save-all:hover { transform:translateY(-2px); box-shadow:0 12px 50px rgba(200,164,92,.35); }

  .admin-video-item {
    display:flex; align-items:center; gap:16px;
    padding:16px; background:#0a0a0a; border-radius:8px;
    margin-bottom:10px; border:1px solid rgba(255,255,255,.04);
  }
  .admin-video-item .admin-field { flex:1; margin-bottom:0; }
  .admin-remove-btn {
    background:none; border:1px solid rgba(231,76,60,.3);
    color:#e74c3c; width:36px; height:36px;
    border-radius:8px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center;
    transition:background .3s;
  }
  .admin-remove-btn:hover { background:rgba(231,76,60,.15); }
  .admin-add-btn {
    padding:10px 20px; border-radius:8px; border:1px dashed rgba(255,255,255,.15);
    background:transparent; color:rgba(255,255,255,.5);
    font-size:13px; cursor:pointer; transition:border-color .3s, color .3s;
    width:100%; margin-top:8px;
  }
  .admin-add-btn:hover { border-color:rgba(200,164,92,.4); color:#c8a45c; }

  .admin-export-btn {
    padding:12px 32px; border-radius:8px; border:1px solid rgba(200,164,92,.3);
    background:transparent; color:#c8a45c; font-size:14px; font-weight:600;
    cursor:pointer; transition:background .3s;
  }
  .admin-export-btn:hover { background:rgba(200,164,92,.1); }

  .admin-actions { display:flex; gap:12px; align-items:center; }

  .admin-upload-btn {
    padding:10px 20px; border-radius:8px; border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.03); color:rgba(255,255,255,.6);
    font-size:13px; cursor:pointer; transition:border-color .3s, color .3s;
    display:inline-block;
  }
  .admin-upload-btn:hover { border-color:rgba(200,164,92,.4); color:#c8a45c; }
  .admin-file-input { display:none; }

  /* ===== HERO ===== */
  #hero {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background:#050505;
    transition:transform 1.1s cubic-bezier(.76,0,.24,1),
               opacity   1.1s cubic-bezier(.76,0,.24,1);
  }
  #hero.curtain-up {
    transform:translateY(-100%);
    opacity:0;
    pointer-events:none;
    z-index:0;
  }
  #hero.curtain-down {
    transform:translateY(0);
    opacity:1;
    pointer-events:auto;
    z-index:100;
  }

  .hero-glow { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .hero-glow .g1 {
    position:absolute; top:-20%; left:-10%; width:60%; height:140%;
    background:radial-gradient(ellipse,rgba(200,164,92,.06) 0%,transparent 70%);
    animation:glowDrift 12s ease-in-out infinite alternate;
  }
  .hero-glow .g2 {
    position:absolute; bottom:-20%; right:-10%; width:50%; height:120%;
    background:radial-gradient(ellipse,rgba(167,139,218,.05) 0%,transparent 70%);
    animation:glowDrift 15s ease-in-out infinite alternate-reverse;
  }
  @keyframes glowDrift {
    0%{transform:translate(0,0) scale(1)}
    100%{transform:translate(8%,5%) scale(1.08)}
  }

  .hero-title {
    position:relative; z-index:10; text-align:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:clamp(4rem,13vw,12rem); color:#fff;
    letter-spacing:-.04em; line-height:.92; user-select:none;
  }
  .glitch-layer {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; opacity:0; transition:all .05s;
  }
  .glitch-gold { color:#c8a45c; clip-path:inset(0 0 55% 0); }
  .glitch-purple { color:#a78bda; clip-path:inset(55% 0 0 0); }
  .hero-title.glitching .glitch-gold { transform:translate(-6px,2px); opacity:.92; }
  .hero-title.glitching .glitch-purple { transform:translate(6px,-2px); opacity:.82; }

  .hero-sub {
    margin-top:36px; font-size:13px; letter-spacing:.38em;
    text-transform:uppercase; color:rgba(255,255,255,.3);
  }
  .scroll-hint {
    position:absolute; bottom:56px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .scroll-line {
    width:1px; height:52px;
    background:linear-gradient(to bottom, rgba(200,164,92,.45), transparent);
    animation:scrollPulse 2s ease-in-out infinite;
  }
  @keyframes scrollPulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .scroll-text {
    font-size:10px; letter-spacing:.28em; text-transform:uppercase;
    color:rgba(255,255,255,.12);
  }

  /* ===== 顶栏音乐按钮（右上角，黑白极简） ===== */
  .nav-music-btn {
    width:32px; height:32px; border-radius:50%;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15);
    color:rgba(255,255,255,.6); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; transition:background .3s, border-color .3s, color .3s;
    flex-shrink:0;
  }
  .nav-music-btn:hover {
    background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.3);
    color:#fff;
  }
  .nav-music-btn.playing {
    background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.35);
    color:#fff;
  }

  /* ===== WORKS ===== */
  #works {
    position:relative; z-index:50;
    background:#0a0a0a;
    padding:120px 40px 180px; min-height:100vh;
    margin-top:100vh;
  }
  .works-header { text-align:center; margin-bottom:80px; }
  .works-label {
    font-size:11px; letter-spacing:.4em; text-transform:uppercase;
    color:#c8a45c; margin-bottom:16px;
  }
  .works-title {
    font-family:'Space Grotesk',sans-serif; font-weight:300;
    font-size:clamp(1.6rem,4vw,3rem); color:rgba(255,255,255,.6);
    letter-spacing:-.02em;
  }

  .works-grid {
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    max-width:1500px; margin:0 auto;
  }
  @media (max-width:900px){
    .works-grid { grid-template-columns:repeat(2, 1fr); gap:8px; }
  }
  @media (max-width:600px){
    .works-grid { grid-template-columns:1fr; gap:8px; padding:0 10px; }
  }

  .video-card { pointer-events:auto; }
  .video-card .card-mute-btn { pointer-events:auto; }

  /* 16:9 容器 + 羽化边缘 */
    position:relative; width:100%;
    padding-bottom:56.25%;
    overflow:hidden; background:#0a0a0a;
    /* 羽化边缘：用 mask-image 实现 */
    -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 55%, transparent 100%);
    mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 55%, transparent 100%);
  }

  .card-iframe {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    border:none;
  }

  .card-poster {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    transition:opacity .8s;
    z-index:2;
    pointer-events:none;
    /* 封面也羽化 */
    -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 55%, transparent 100%);
    mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 55%, transparent 100%);
  }
  .video-card.playing .card-poster { opacity:0; }

  .video-card:hover {
    transform:rotate(0deg) translateY(-10px) scale(1.03) !important;
    z-index:20;
    box-shadow:0 40px 120px -30px rgba(0,0,0,.9),
               0 0 80px -25px rgba(200,164,92,.1);
  }

  .card-index {
    position:absolute; top:12px; left:14px; z-index:8;
    font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:12px; color:rgba(255,255,255,.3);
    pointer-events:none; transition:color .3s;
  }
  .video-card:hover .card-index { color:rgba(200,164,92,.7); }
  .video-card.playing .card-index { opacity:0; }

  .card-overlay {
    position:absolute; inset:0; z-index:6;
    background:linear-gradient(to top,
      rgba(10,10,10,.95) 0%, rgba(10,10,10,.35) 45%, transparent 70%);
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:20px 16px; opacity:0; transition:opacity .45s;
    pointer-events:none;
  }
  .video-card:hover .card-overlay { opacity:1; }
  .video-card.playing .card-overlay { opacity:0 !important; }
  .card-cat {
    font-size:9px; letter-spacing:.35em; text-transform:uppercase;
    color:#c8a45c; margin-bottom:5px; opacity:.7;
  }
  .card-name {
    font-family:'Space Grotesk',sans-serif; font-weight:500;
    font-size:clamp(11px,1.1vw,15px); color:#fff;
    letter-spacing:-.01em; line-height:1.35;
  }

  /* 静音按钮：始终可见，右上角 */
  .card-mute-btn {
    position:absolute; top:10px; right:10px; z-index:10;
    width:28px; height:28px; border-radius:50%;
    background:rgba(0,0,0,.5); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.12);
    color:#fff; font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    opacity:.65; transition:opacity .25s, background .25s, border-color .25s;
    pointer-events:auto;
  }
  .card-mute-btn:hover { opacity:1; background:rgba(200,164,92,.2); border-color:rgba(200,164,92,.35); }
  .card-mute-btn.muted { opacity:.45; }
  .video-card.playing .card-mute-btn { opacity:.8; }
  .video-card.playing .card-mute-btn:hover { opacity:1; }

  /* 羽化边缘：叠加一层径向渐变让边缘和背景融合 */
  .card-media::after {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 50%, #111 100%);
    pointer-events:none; z-index:5;
  }

  /* ===== ABOUT ===== */
  #about {
    padding:140px 48px 120px;
    background:linear-gradient(180deg,#0a0a0a 0%,#080808 100%);
    border-top:1px solid rgba(255,255,255,.04);
  }
  .about-inner {
    max-width:1100px; margin:0 auto;
    display:flex; align-items:center; gap:80px;
  }
  .about-avatar-wrap {
    position:relative; flex-shrink:0;
  }
  .about-avatar {
    width:260px; height:260px; border-radius:6px;
    object-fit:cover;
    transition:filter .6s;
    border:1px solid rgba(255,255,255,.04);
  }
  .about-avatar:hover { filter:brightness(1.15) contrast(1.05); }
  .about-text { flex:1; }
  .about-tag {
    font-size:11px; letter-spacing:.4em; text-transform:uppercase;
    color:#c8a45c; margin-bottom:20px;
  }
  .about-bio {
    font-size:clamp(16px,1.6vw,20px); font-weight:300;
    line-height:1.75; color:rgba(255,255,255,.55);
    margin-bottom:40px;
  }
  .about-contact { display:flex; flex-direction:column; gap:16px; }
  .contact-item {
    display:flex; align-items:center; gap:14px;
    font-size:14px; color:rgba(255,255,255,.3);
    transition:color .3s;
  }
  .contact-item:hover { color:#fff; }
  .contact-icon { flex-shrink:0; opacity:.5; }

  footer { padding:56px 48px; text-align:center; border-top:1px solid rgba(255,255,255,.04); }
  .footer-copy { color:rgba(255,255,255,.07); font-size:11px; letter-spacing:.1em; }

  @media(max-width:1100px){
    .works-grid{ grid-template-columns:repeat(6,1fr); gap:8px; }
    .grid-span-1, .grid-span-2 { grid-column:span 1; }
    .grid-span-3, .grid-span-4 { grid-column:span 2; }
    .grid-span-6 { grid-column:span 3; }
    .grid-span-12 { grid-column:span 6; }
  }

  
  /* ===== Ctrl+Shift+A 后台快捷键 ===== */
  document.addEventListener('keydown', function(e){
    if(e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')){
      e.preventDefault();
      openAdminLogin();
    }
  });

})();
</script>
</body>
</html>

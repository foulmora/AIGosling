<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AIGosling AI 影像作品索引。">
  <title>AIGosling | AI Film Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000;
      --white: #fff;
      --dim: rgba(255, 255, 255, 0.58);
      --dim-2: rgba(255, 255, 255, 0.32);
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(255, 255, 255, 0.28);
      --panel: rgba(255, 255, 255, 0.04);
      --red: #ff3b30;
      --mono: "IBM Plex Mono", "Courier New", monospace;
      --display: "Bebas Neue", "Noto Sans SC", sans-serif;
      --sans: "Noto Sans SC", "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      letter-spacing: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.12;
      background-image: linear-gradient(rgba(255,255,255,0.11) 1px, transparent 1px);
      background-size: 100% 8px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      font: inherit;
      letter-spacing: 0;
    }

    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: #030303;
      overflow: hidden;
    }

    .bg-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.34;
      filter: grayscale(1) contrast(1.25) brightness(0.72);
      transform: scale(1.04);
      transition: opacity 420ms ease, transform 900ms ease, filter 420ms ease;
    }

    .bg-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.92), rgba(0,0,0,0.48) 48%, rgba(0,0,0,0.84)),
        linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.86));
    }

    .shell {
      width: min(1500px, calc(100% - 56px));
      margin: 0 auto;
    }

    .brand-bar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding-top: 28px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.4;
      color: var(--dim);
      text-transform: uppercase;
    }

    .brand-bar a {
      color: var(--white);
      border-bottom: 1px solid var(--line-strong);
    }

    .hero-index {
      min-height: 92svh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-bottom: 22px;
    }

    .hero-layout {
      display: grid;
      grid-template-columns: minmax(190px, 0.32fr) minmax(0, 0.68fr);
      gap: 56px;
      align-items: start;
      padding: 52px 0 42px;
    }

    .left-rail {
      position: sticky;
      top: 28px;
      display: grid;
      gap: 24px;
      min-width: 0;
    }

    .rail-label,
    .project-meta,
    .mini-label,
    .footer,
    .empty {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      color: var(--dim-2);
      text-transform: uppercase;
    }

    .rail-list,
    .project-index {
      display: grid;
      gap: 20px;
    }

    .rail-link,
    .project-link {
      display: grid;
      gap: 5px;
      color: var(--white);
    }

    .rail-link {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .rail-link strong {
      font-family: var(--display);
      font-size: 38px;
      line-height: 0.9;
      font-weight: 400;
      text-transform: uppercase;
    }

    .rail-link.missing {
      color: var(--dim);
    }

    .project-group {
      display: grid;
      justify-items: end;
      text-align: right;
    }

    .project-link {
      display: inline-grid;
      justify-items: end;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .project-index:hover .project-link {
      opacity: 0.24;
    }

    .project-index .project-link:hover {
      opacity: 1;
      transform: translateX(-16px);
    }

    .project-title {
      font-family: var(--display);
      font-size: 88px;
      line-height: 0.86;
      font-weight: 400;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .hero-info {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      text-transform: uppercase;
    }

    .hero-info strong {
      color: var(--white);
      font-weight: 700;
    }

    .section {
      border-top: 1px solid var(--line);
      background: rgba(0,0,0,0.88);
    }

    .project {
      min-height: 82svh;
      display: grid;
      align-items: end;
      position: relative;
      overflow: hidden;
      border-top: 1px solid var(--line);
      background: #060606;
    }

    .project::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--cover);
      background-size: cover;
      background-position: center;
      filter: grayscale(1) contrast(1.18) brightness(0.7);
      transform: scale(1.02);
    }

    .project::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.92)),
        linear-gradient(90deg, rgba(0,0,0,0.9), rgba(0,0,0,0.12));
    }

    .project-body {
      position: relative;
      z-index: 1;
      padding: 0 0 54px;
    }

    .project-number {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .project-number::after {
      content: "";
      width: 70px;
      height: 1px;
      background: var(--line-strong);
    }

    .project-hero-title {
      margin: 0;
      font-family: var(--display);
      font-size: 132px;
      line-height: 0.84;
      font-weight: 400;
      text-transform: uppercase;
      max-width: 980px;
      overflow-wrap: anywhere;
    }

    .project-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
      text-transform: uppercase;
    }

    .project-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .pill-link {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line-strong);
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--white);
      text-transform: uppercase;
      background: rgba(0,0,0,0.22);
    }

    .compact-section {
      padding: 72px 0;
    }

    .compact-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }

    .compact-head h2 {
      margin: 0;
      font-family: var(--display);
      font-size: 68px;
      line-height: 0.9;
      font-weight: 400;
      text-transform: uppercase;
    }

    .log-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line);
    }

    .log-item {
      min-height: 190px;
      display: grid;
      align-content: space-between;
      gap: 32px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 18px;
      background: var(--panel);
      transition: background 180ms ease;
    }

    .log-item:hover {
      background: rgba(255,255,255,0.09);
    }

    .log-item:nth-child(3n) {
      border-right: 0;
    }

    .log-item h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 900;
    }

    .about-strip {
      display: grid;
      grid-template-columns: minmax(0, 0.55fr) minmax(260px, 0.45fr);
      gap: 48px;
      align-items: end;
      padding: 76px 0;
      border-top: 1px solid var(--line);
    }

    .about-strip h2 {
      margin: 0;
      font-family: var(--display);
      font-size: 78px;
      line-height: 0.9;
      font-weight: 400;
      text-transform: uppercase;
    }

    .about-strip p {
      margin: 0;
      color: var(--dim);
      line-height: 1.8;
      max-width: 560px;
    }

    .footer {
      padding: 32px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      background: #000;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 500ms ease, transform 500ms ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    @media (max-width: 1100px) {
      .project-title {
        font-size: 70px;
      }

      .project-hero-title {
        font-size: 104px;
      }
    }

    @media (max-width: 780px) {
      .shell {
        width: calc(100% - 28px);
      }

      .hero-index {
        min-height: auto;
      }

      .brand-bar {
        padding-top: 18px;
      }

      .hero-layout {
        grid-template-columns: 1fr;
        gap: 42px;
        padding: 42px 0 34px;
      }

      .left-rail {
        position: static;
      }

      .rail-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .rail-link strong {
        font-size: 30px;
      }

      .project-group,
      .project-link {
        justify-items: start;
        text-align: left;
      }

      .project-index .project-link:hover {
        transform: translateX(0);
      }

      .project-title {
        font-size: 58px;
      }

      .hero-info,
      .compact-head,
      .footer,
      .about-strip {
        display: grid;
        grid-template-columns: 1fr;
      }

      .project {
        min-height: 72svh;
      }

      .project-hero-title {
        font-size: 72px;
      }

      .compact-head h2,
      .about-strip h2 {
        font-size: 58px;
      }

      .log-grid {
        grid-template-columns: 1fr;
      }

      .log-item,
      .log-item:nth-child(3n) {
        border-right: 0;
      }
    }

    @media (max-width: 460px) {
      .rail-list {
        grid-template-columns: 1fr;
      }

      .project-title {
        font-size: 48px;
      }

      .project-hero-title {
        font-size: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stage" aria-hidden="true">
    <img id="bg-image" src="assets/visual-shanhai.png" alt="">
  </div>

  <main id="top">
    <section class="hero-index shell">
      <div class="brand-bar">
        <span id="brand-line">AIGOSLING // V.2026</span>
        <a href="admin.html">ADMIN</a>
      </div>

      <div class="hero-layout">
        <aside class="left-rail" aria-label="外部平台">
          <div class="rail-label">SOCIAL / CHANNELS</div>
          <div class="rail-list" id="social-links"></div>
        </aside>

        <nav class="project-index" id="project-index" aria-label="作品索引"></nav>
      </div>

      <div class="hero-info">
        <div><strong>AI FILM INDEX</strong><br><span id="hero-short">AI 短片 / 角色 IP / 视觉实验</span></div>
        <div id="hero-contact">CHINA / ONLINE</div>
      </div>
    </section>

    <section class="section" id="works"></section>

    <section class="section compact-section" id="tutorials">
      <div class="shell">
        <div class="compact-head reveal">
          <div>
            <div class="mini-label">PROCESS LOGS</div>
            <h2>LOGS</h2>
          </div>
          <div class="mini-label">SHORT NOTES / TUTORIALS</div>
        </div>
        <div class="log-grid" id="tutorial-list"></div>
      </div>
    </section>

    <section class="section" id="about">
      <div class="shell about-strip reveal">
        <div>
          <div class="mini-label">ABOUT</div>
          <h2>AIGOSLING</h2>
        </div>
        <p id="about-copy">AI film / character IP / visual experiments.</p>
      </div>
    </section>
  </main>

  <footer class="footer shell">
    <span>AIGOSLING // 2026</span>
    <span>WWW.AIGOSLING.COM</span>
  </footer>

  <script>
    const fallbackContent = {
      site: {
        brand: "AIGosling",
        introZh: "AI 短片 / 角色 IP / 视觉实验。",
        introEn: "AI film / character IP / visual experiments.",
        location: "China / Online",
        email: "hello@aigosling.com",
        douyin: "https://v.douyin.com/l1ZxVndn95I",
        youtube: "",
        x: "",
        aboutZh: "AIGosling 是一个 AI 影像作品索引，记录短片、角色与视觉实验。",
        aboutEn: "AIGosling is an AI film index for shorts, characters, and visual experiments."
      },
      works: [
        {
          id: "work-001",
          titleZh: "山海异闻录",
          titleEn: "Records of Shanhai",
          cover: "assets/visual-shanhai.png",
          year: "2026",
          tags: ["AI短片", "东方奇幻"]
        },
        {
          id: "work-002",
          titleZh: "城市夜航",
          titleEn: "Night Run Protocol",
          cover: "assets/visual-night-run.png",
          year: "2026",
          tags: ["视觉实验", "城市"]
        },
        {
          id: "work-003",
          titleZh: "角色设定：灵鹿少年",
          titleEn: "Character Study: Spirit Deer",
          cover: "assets/visual-spirit-deer.png",
          year: "2026",
          tags: ["角色IP", "一致性"]
        }
      ],
      tutorials: [
        {
          titleZh: "AI 短片从 0 到 1 的工作流",
          tags: ["教程"],
          url: ""
        },
        {
          titleZh: "角色一致性提示词模板",
          tags: ["提示词"],
          url: ""
        }
      ],
      journal: []
    };

    const state = {
      content: fallbackContent
    };

    const byId = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function slug(value, fallback) {
      return String(value || fallback)
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
        .replace(/^-+|-+$/g, "") || fallback;
    }

    function titleFor(item) {
      return item.titleEn || item.titleZh || "UNTITLED";
    }

    function localTitleFor(item) {
      return item.titleZh || item.titleEn || "未命名";
    }

    function formatIndexTitle(value) {
      const clean = String(value || "UNTITLED").replace(/\s+/g, " ").trim();
      const parts = clean.split(/[:：&]/).map((part) => part.trim()).filter(Boolean);
      if (parts.length > 1) return parts.slice(0, 2).join("<br>");
      const words = clean.split(" ");
      if (words.length > 2) {
        const middle = Math.ceil(words.length / 2);
        return `${escapeHtml(words.slice(0, middle).join(" "))}<br>${escapeHtml(words.slice(middle).join(" "))}`;
      }
      return escapeHtml(clean);
    }

    function coverFor(item) {
      return item.cover || "assets/visual-shanhai.png";
    }

    function socialHref(site, key) {
      const value = (site[key] || "").trim();
      if (!value) return "";
      if (key === "email") return `mailto:${value}`;
      return value;
    }

    function renderSocial() {
      const site = state.content.site || {};
      const links = [
        ["x", "X.COM"],
        ["youtube", "YOUTUBE"],
        ["douyin", "DOUYIN"],
        ["email", "EMAIL"],
        ["admin", "ADMIN"]
      ];

      byId("social-links").innerHTML = links.map(([key, label], index) => {
        const href = key === "admin" ? "admin.html" : socialHref(site, key);
        const isMissing = !href;
        const url = href || "admin.html";
        const target = key === "admin" || key === "email" || isMissing ? "" : " target=\"_blank\" rel=\"noreferrer\"";
        return `
          <a class="rail-link ${isMissing ? "missing" : ""}" href="${escapeHtml(url)}"${target}>
            <span class="project-meta">${String(index + 1).padStart(2, "0")} // ${isMissing ? "ADD URL" : "OPEN"}</span>
            <strong>${escapeHtml(label)}</strong>
          </a>
        `;
      }).join("");
    }

    function renderIndex() {
      const works = state.content.works || [];
      const index = works.length ? works : fallbackContent.works;

      if (!index.length) {
        byId("project-index").innerHTML = `<div class="empty">NO WORKS YET</div>`;
        return;
      }

      byId("project-index").innerHTML = index.map((item, i) => {
        const id = slug(item.id || item.titleEn || item.titleZh, `work-${i + 1}`);
        const meta = `${String(i + 1).padStart(2, "0")} // ${(item.tags || ["AI FILM"])[0]} // ${item.year || "2026"}`;
        return `
          <div class="project-group">
            <a class="project-link" href="#${escapeHtml(id)}" data-cover="${escapeHtml(coverFor(item))}">
              <span class="project-meta">${escapeHtml(meta)}</span>
              <span class="project-title">${formatIndexTitle(titleFor(item))}</span>
            </a>
          </div>
        `;
      }).join("");

      document.querySelectorAll("[data-cover]").forEach((link) => {
        link.addEventListener("mouseenter", () => {
          const bg = byId("bg-image");
          bg.src = link.dataset.cover;
          bg.style.opacity = "0.46";
          bg.style.transform = "scale(1.08)";
        });
        link.addEventListener("mouseleave", () => {
          const bg = byId("bg-image");
          bg.style.opacity = "0.34";
          bg.style.transform = "scale(1.04)";
        });
      });
    }

    function renderProjects() {
      const works = state.content.works || [];
      byId("works").innerHTML = works.map((item, i) => {
        const id = slug(item.id || item.titleEn || item.titleZh, `work-${i + 1}`);
        const tags = (item.tags || []).slice(0, 4).map((tag) => `<span>${escapeHtml(tag)}</span>`).join("");
        const video = item.video ? `<a class="pill-link" href="${escapeHtml(item.video)}" target="_blank" rel="noreferrer">WATCH</a>` : "";
        return `
          <article class="project" id="${escapeHtml(id)}" style="--cover: url('${escapeHtml(coverFor(item))}')">
            <div class="shell project-body reveal">
              <div class="project-number">Project ${String(i + 1).padStart(2, "0")}</div>
              <h2 class="project-hero-title">${formatIndexTitle(titleFor(item))}</h2>
              <div class="project-sub">
                <span>${escapeHtml(localTitleFor(item))}</span>
                <span>${escapeHtml(item.year || "2026")}</span>
                ${tags}
              </div>
              <div class="project-actions">
                ${video}
                <a class="pill-link" href="#top">BACK TO INDEX</a>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderTutorials() {
      const tutorials = state.content.tutorials || [];
      byId("tutorial-list").innerHTML = tutorials.length ? tutorials.map((item, i) => {
        const href = item.url || "admin.html";
        const target = item.url ? " target=\"_blank\" rel=\"noreferrer\"" : "";
        return `
          <a class="log-item reveal" href="${escapeHtml(href)}"${target}>
            <span class="mini-label">${String(i + 1).padStart(2, "0")} // ${(item.tags || ["LOG"])[0]}</span>
            <h3>${escapeHtml(item.titleZh || item.titleEn || "未命名")}</h3>
            <span class="mini-label">${item.url ? "OPEN" : "ADD LINK IN ADMIN"}</span>
          </a>
        `;
      }).join("") : `<div class="empty">NO LOGS YET</div>`;
    }

    function renderStatic() {
      const site = state.content.site || {};
      byId("brand-line").textContent = `${(site.brand || "AIGosling").toUpperCase()} // V.2026`;
      byId("hero-short").textContent = site.introZh || site.introEn || "AI FILM / CHARACTER IP / VISUAL EXPERIMENTS";
      byId("hero-contact").textContent = `${site.location || "China / Online"}${site.email ? " // " + site.email : ""}`;
      byId("about-copy").textContent = site.aboutZh || site.aboutEn || "AI film / character IP / visual experiments.";
      if ((state.content.works || [])[0]) byId("bg-image").src = coverFor(state.content.works[0]);
    }

    function observe() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) entry.target.classList.add("visible");
        });
      }, { threshold: 0.08 });
      document.querySelectorAll(".reveal").forEach((node) => observer.observe(node));
    }

    function renderPage() {
      renderStatic();
      renderSocial();
      renderIndex();
      renderProjects();
      renderTutorials();
      observe();
    }

    async function load() {
      renderPage();

      try {
        const response = await fetch("content.json", { cache: "no-store" });
        if (!response.ok) throw new Error("content load failed");
        state.content = await response.json();
      } catch {
        state.content = fallbackContent;
      }

      renderPage();
    }

    load();
  </script>
</body>
</html>
